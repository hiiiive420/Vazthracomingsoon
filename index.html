<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VAZTHRA — Coming Soon</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --bg: #f7f6ef;
      --surface: rgba(255, 255, 255, 0.78);
      --green: #0f6b3d;
      --green-dark: #0b4f2d;
      --green-soft: #9ab9a8;
      --gold: #c3a04a;
      --gold-soft: #dcc48b;
      --text: #173522;
      --muted: #5f6f63;
      --border: rgba(195, 160, 74, 0.45);
      --shadow: 0 20px 60px rgba(18, 54, 31, 0.12);
      --radius: 28px;
      --max: 1200px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(154, 185, 168, 0.22), transparent 22%),
        radial-gradient(circle at top right, rgba(154, 185, 168, 0.22), transparent 20%),
        radial-gradient(circle at bottom left, rgba(154, 185, 168, 0.18), transparent 18%),
        radial-gradient(circle at bottom right, rgba(154, 185, 168, 0.18), transparent 18%),
        var(--bg);
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background-image:
        linear-gradient(135deg, transparent 0 92%, rgba(154, 185, 168, 0.18) 92% 100%),
        linear-gradient(-135deg, transparent 0 92%, rgba(154, 185, 168, 0.18) 92% 100%),
        linear-gradient(45deg, transparent 0 92%, rgba(154, 185, 168, 0.14) 92% 100%),
        linear-gradient(-45deg, transparent 0 92%, rgba(154, 185, 168, 0.14) 92% 100%);
      background-size: 260px 260px;
      background-position: top left, top right, bottom left, bottom right;
      background-repeat: no-repeat;
      opacity: 0.9;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, var(--max));
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      border-radius: clamp(24px, 4vw, 40px);
      padding: clamp(28px, 4vw, 56px);
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: clamp(28px, 4vw, 48px);
      align-items: center;
    }

    .brand-logo {
      width: 220px;
      margin: 0 auto 20px;
      display: block;
    }

    .left { text-align: center; }

    .logo-title {
      font-size: clamp(2rem, 4vw, 4.1rem);
      font-weight: 800;
      letter-spacing: 0.28em;
      color: var(--green-dark);
    }

    .tagline {
      margin: 8px 0 28px;
      font-family: Georgia, serif;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.55);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 4px rgba(195,160,74,0.12);
      animation: blink 1.2s infinite ease-in-out;
    }

    .eyebrow::after {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 4px rgba(195,160,74,0.12);
    }

    @keyframes blink {
      0%,100% { opacity:1; transform:scale(1);}
      50% { opacity:0.4; transform:scale(0.85);}
    }

    .headline {
      font-family: Georgia, serif;
      font-size: clamp(2.2rem, 4.4vw, 4.6rem);
      color: var(--green-dark);
    }

    .headline strong {
      display: block;
      font-family: Arial;
      font-weight: 800;
      margin-top: 10px;
    }

    .desc {
      margin-top: 20px;
      color: var(--muted);
      line-height: 1.75;
    }

    .socials {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 10px;
    }

    .socials a {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: white;
      border: 1px solid rgba(195, 160, 74, 0.28);
      color: var(--green-dark);
      text-decoration: none;
    }

    @media (max-width: 980px) {
      .card { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">

      <div class="left">
        <img src="logo.png" class="brand-logo" />
        <h1 class="logo-title">VAZTHRA</h1>
        <p class="tagline">Kurthify Your Life</p>

        <div class="eyebrow">Coming Soon</div>

        <p class="headline">
          A New Dimension of Style
          <strong>Is Just Around the Corner</strong>
        </p>

        <p class="desc">
          VAZTHRA is preparing to unveil a refined fashion experience inspired by modern elegance.
        </p>

        <div class="socials">
          <a href="https://web.facebook.com/profile.php?id=61574391822604" target="_blank">
            <i class="fab fa-facebook-f"></i>
          </a>
          <a href="https://www.instagram.com/vazthraonline/" target="_blank">
            <i class="fab fa-instagram"></i>
          </a>
        </div>

      </div>

    </section>
  </main>
</body>
</html>
